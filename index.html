<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7X GAMING - Tournament</title>
    <style>
        /* CSS for Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0e17; /* Dark Background */
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 360px; /* Mobile View Width */
            height: 640px;
            background: #121826;
            border: 4px solid #333;
            border-radius: 20px;
            overflow-y: auto; /* Scrollable */
            box-shadow: 0 10px 20px rgba(0,250,255,0.2); /* Neon Glow */
        }

        /* Header */
        .header {
            background-color: #1a2235;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #00f2fe;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: #00f2fe; /* Neon Cyan */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Content Area */
        .content {
            padding: 20px;
        }

        /* Tournament Card */
        .tournament-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .tournament-card h2 {
            margin-top: 0;
            color: #4facfe;
            font-size: 18px;
        }

        .details p {
            margin: 5px 0;
            font-size: 14px;
        }

        .highlight {
            color: #00f2fe;
            font-weight: bold;
        }

        .prize-pool {
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        /* Input Fields */
        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a2235;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        input:focus {
            border-color: #00f2fe;
            outline: none;
        }

        /* Button */
        .btn-register {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00f2fe 0%, #4facfe 100%);
            color: #0a0e17;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-register:hover {
            box-shadow: 0 0 10px #00f2fe;
        }

        /* QR Section */
        .qr-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px auto;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Leaderboard Table */
        .leaderboard {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-top: 10px;
        }

        .leaderboard th, .leaderboard td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        .leaderboard th {
            color: #4facfe;
        }

        .rank-1 { color: #ffd700; font-weight: bold; } /* Gold */

    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <h1>7X GAMING</h1>
        </div>

        <div class="content">
            <!-- Part 1: Tournament Info -->
            <div class="tournament-card">
                <h2>BGMI SOLO Showdown</h2>
                <div class="details">
                    <p>Time: <span class="highlight">15 Oct 2024, 07:00 PM</span></p>
                    <p>Mode: <span class="highlight">SOLO (100 Players)</span></p>
                    <p>Entry Fee: <span class="highlight">₹20</span></p>
                </div>
                <div class="prize-pool">
                    <p>Chicken Dinner: <span class="highlight">₹500</span></p>
                    <p>Per Kill: <span class="highlight">₹5</span></p>
                </div>
            </div>

            <!-- Part 2: Login/Register -->
            <div class="tournament-card">
                <h2>Register for Match</h2>
                <input type="email" placeholder="Apna Email Daalein" required>
                <input type="tel" placeholder="Mobile Number Daalein" required>
                <button class="btn-register">Register Now</button>
            </div>

            <!-- Part 3: QR Payment (Example) -->
            <!-- <div class="qr-section">
                <h3>Pay ₹20 to Register</h3>
                <div class="qr-placeholder">QR CODE HERE</div>
                <p style="font-size: 12px; color: #aaa;">Scan & Pay, then enter Transaction ID.</p>
                <input type="text" placeholder="Transaction ID (UTR)">
            </div> -->

            <!-- Part 4: Leaderboard Demo -->
            <div class="tournament-card">
                <h2>Leaderboard (Last Match)</h2>
                <table class="leaderboard">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Kills</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="rank-1">#1</td>
                            <td>PlayerAlpha</td>
                            <td>12</td>
                        </tr>
                        <tr>
                            <td>#2</td>
                            <td>GamerBeta</td>
                            <td>8</td>
                        </tr>
                        <tr>
                            <td>#3</td>
                            <td>ProGamma</td>
                            <td>5</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
